version: "3.8"

services:
  # 关系数据库 + 业务后端数据持久化
  # 生产环境建议替换为 PostgreSQL

  ollama:
    image: ollama/ollama:latest
    container_name: rsdp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Windows 无 GPU 时删除 deploy.resources 部分

  chromadb:
    image: chromadb/chroma:latest
    container_name: rsdp-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  redis:
    image: redis:7-alpine
    container_name: rsdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: rsdp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rsdp-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - OLLAMA_URL=http://ollama:11434
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - ollama
      - chromadb
      - redis
      - minio
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rsdp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: rsdp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  ollama-models:
  chroma-data:
  redis-data:
  minio-data:
  backend-data:
