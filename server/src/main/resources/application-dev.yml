spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/rsdp?currentSchema=public
    username: ${DB_USERNAME:your-db-username}
    password: ${DB_PASSWORD:your-db-password}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      enabled: false

minio:
  enabled: false

# 开发环境文件先存本地磁盘
storage:
  type: local
  local-path: ./data/uploads
