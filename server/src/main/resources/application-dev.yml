spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/rsdp_dev.db?journal_mode=WAL
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      enabled: false

minio:
  enabled: false

# 开发环境文件先存本地磁盘
storage:
  type: local
  local-path: ./data/uploads
