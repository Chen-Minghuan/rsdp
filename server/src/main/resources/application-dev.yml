spring:
  datasource:
    # 默认使用 SQLite，零配置即可本地开发
    # 如需切换 PostgreSQL，取消下面注释并注释掉 SQLite 配置
    # driver-class-name: org.postgresql.Driver
    # url: jdbc:postgresql://localhost:5432/rsdp
    # username: rsdp
    # password: rsdp
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/rsdp_dev.db?journal_mode=WAL
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # SQLite 需要指定分页方言
    # PostgreSQL 可删除 dialect 配置，SpringBoot 自动识别
    # dialect 配置待后续添加 MybatisPlusConfig 时统一处理

minio:
  enabled: false

# 开发环境文件先存本地磁盘
storage:
  type: local
  local-path: ./data/uploads
