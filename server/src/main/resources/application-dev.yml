spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/rsdp?currentSchema=public
    username: ${DB_USERNAME:rsdp}
    password: ${DB_PASSWORD:rsdp}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      enabled: false

# 开发环境文件先存本地磁盘
storage:
  type: local
  local-path: ./data/uploads
