spring:
  application:
    name: rsdp-server
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      force-request-encoding: true
      force-response-encoding: true

storage:
  type: local
  local-path: ./data/uploads

mybatis-plus:
  # 注册 TypeHandler 包路径，确保 @TableField(typeHandler) 和价格加密处理器生效
  type-handlers-package: com.rsdp.config.typehandler

rsdp:
  ai:
    # 通义千问 VL 兼容 OpenAI 格式
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3-vl-plus
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    timeout-seconds: 60
    max-retries: 2
    # 异步 AI 识别允许的最大图片字节数（默认 20MB）
    max-image-size: 20971520
    # Mock 模式：开启后 AI 识别返回固定模拟结果，仅用于本地无密钥联调
    mock:
      enabled: false
    # 多模态 embedding 模型，用于以图搜图
    embedding-model: multimodal-embedding-v1
    embedding-base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding
    embedding-timeout-seconds: 30
    embedding-max-retries: 2
  chromadb:
    base-url: ${CHROMADB_URL:http://localhost:8000}
    collection: rsdp_products
    timeout-seconds: 10
    max-retries: 2
    # ChromaDB Token 认证凭证；留空表示不启用认证
    auth-token: ${CHROMADB_AUTH_TOKEN:${CHROMA_AUTH_CREDENTIALS:}}
  encryption:
    # Base64 编码的 32 字节 AES-256 密钥，生产环境必须通过 RSDP_ENCRYPTION_KEY 注入
    key: ${RSDP_ENCRYPTION_KEY:}
  migration:
    encrypt-prices:
      # 历史价格字段加密迁移开关，默认关闭；需要迁移时设为 true 并重启应用
      enabled: false
      batch-size: 100
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 200
    thread-name-prefix: rsdp-async-
    # 线程池队列满时的拒绝策略：abort（默认，抛异常）/ discard / discard-oldest / caller-runs
    rejected-policy: abort
  jwt:
    # JWT 签名密钥，Base64 编码，长度至少 256 位（32 字节）
    # 必须通过环境变量 RSDP_JWT_SECRET 注入，切勿在配置中硬编码
    secret: ${RSDP_JWT_SECRET}
    # token 有效期，单位小时
    expiration-hours: 24
    # HttpOnly Cookie 配置
    cookie-name: ${RSDP_JWT_COOKIE_NAME:rsdp_token}
    # Secure 属性：生产环境必须 true，开发环境若使用 http 可设为 false
    cookie-secure: ${RSDP_JWT_COOKIE_SECURE:true}
    cookie-same-site: ${RSDP_JWT_COOKIE_SAME_SITE:Strict}
  security:
    # 允许跨域来源，逗号分隔；生产环境必须通过 RSDP_ALLOWED_ORIGINS 配置为具体域名白名单
    allowed-origins: ${RSDP_ALLOWED_ORIGINS:http://localhost:5173}
    # 登录防爆破保护
    login:
      # 允许的最大失败次数，超过则锁定
      max-attempts: ${RSDP_LOGIN_MAX_ATTEMPTS:5}
      # 锁定时长（分钟）
      lock-duration-minutes: ${RSDP_LOGIN_LOCK_DURATION_MINUTES:15}
      # 失败计数窗口（分钟）
      attempt-window-minutes: ${RSDP_LOGIN_ATTEMPT_WINDOW_MINUTES:30}
  import:
    # 产品批量导入时允许下载图片的 host 白名单，逗号分隔；留空表示仅允许公网地址
    allowed-image-hosts: ${RSDP_IMPORT_ALLOWED_IMAGE_HOSTS:}
  document-import:
    pdf:
      # PDF 导入文件大小上限（MB）
      max-file-size-mb: 50
      # PDF 最大页数
      max-pages: 200
      # 渲染 DPI
      render-dpi: 150
      # 页面区域检测每批最大页数
      # 注意：AI 对长 JSON 输出有截断风险，MVP 阶段建议保持 <=5，确保每批返回结果完整
      detect-batch-size: 5
      # 裁剪输出图片格式
      output-format: jpg
      # 裁剪输出图片质量（1-100，仅对 jpg 有效）
      output-quality: 90
