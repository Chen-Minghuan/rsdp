spring:
  application:
    name: rsdp-server
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8081

rsdp:
  upload:
    path: ./data/uploads/
  ai:
    # 通义千问 VL 兼容 OpenAI 格式
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3-vl-plus
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    timeout-seconds: 60
