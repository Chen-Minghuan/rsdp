spring:
  application:
    name: rsdp-server
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      force-request-encoding: true
      force-response-encoding: true

storage:
  type: local
  local-path: ./data/uploads

rsdp:
  ai:
    # 通义千问 VL 兼容 OpenAI 格式
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3-vl-plus
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    timeout-seconds: 60
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 200
    thread-name-prefix: rsdp-async-
