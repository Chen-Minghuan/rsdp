spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:rsdp}
    username: ${DB_USERNAME:rsdp}
    password: ${DB_PASSWORD:rsdp}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0
      enabled: true

minio:
  enabled: true
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:rsdp}

storage:
  type: minio

ollama:
  base-url: ${OLLAMA_URL:http://ollama:11434}

chromadb:
  base-url: ${CHROMADB_URL:http://chromadb:8000}
