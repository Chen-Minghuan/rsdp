spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:rsdp}
    username: ${DB_USERNAME:rsdp}
    password: ${DB_PASSWORD:rsdp}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0
      enabled: true

storage:
  type: minio
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket-name: ${MINIO_BUCKET:rsdp}

rsdp:
  ai:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3-vl-plus
    api-key: ${DASHSCOPE_API_KEY}
    timeout-seconds: 60
    max-retries: 2
    embedding-model: multimodal-embedding-v1
    embedding-base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding
    embedding-timeout-seconds: 30
    embedding-max-retries: 2
  chromadb:
    base-url: ${CHROMADB_URL:http://chromadb:8000}
    collection: rsdp_products
    timeout-seconds: 10
    max-retries: 2
    auth-token: ${CHROMADB_AUTH_TOKEN:${CHROMA_AUTH_CREDENTIALS:}}
  encryption:
    key: ${RSDP_ENCRYPTION_KEY}
  migration:
    encrypt-prices:
      enabled: false
      batch-size: 100
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 200
    thread-name-prefix: rsdp-async-
    rejected-policy: abort
  jwt:
    secret: ${RSDP_JWT_SECRET}
    expiration-hours: 24
  import:
    # 产品批量导入时允许下载图片的 host 白名单，逗号分隔；留空表示仅允许公网地址
    allowed-image-hosts: ${RSDP_IMPORT_ALLOWED_IMAGE_HOSTS:}
