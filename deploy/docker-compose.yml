version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rsdp-postgres
    # 生产环境建议移除宿主机端口映射；本地开发需要连接 127.0.0.1:5433
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: rsdp
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql

  ollama:
    image: ollama/ollama:latest
    container_name: rsdp-ollama
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Windows 无 GPU 时删除 deploy.resources 部分

  chromadb:
    image: chromadb/chroma:latest
    container_name: rsdp-chromadb
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_AUTHN_PROVIDER=${CHROMA_AUTH_PROVIDER:-}
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_AUTH_CREDENTIALS:-}

  redis:
    image: redis:7-alpine
    container_name: rsdp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: rsdp-minio
    # 仅通过内部网络暴露，不映射宿主机端口
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: rsdp-server
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=rsdp
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - OLLAMA_URL=http://ollama:11434
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - CHROMADB_AUTH_TOKEN=${CHROMA_AUTH_CREDENTIALS:-}
      - RSDP_ENCRYPTION_KEY=${RSDP_ENCRYPTION_KEY}
      - RSDP_JWT_SECRET=${RSDP_JWT_SECRET}
      - RSDP_JWT_COOKIE_SECURE=${RSDP_JWT_COOKIE_SECURE:-true}
      - RSDP_ALLOWED_ORIGINS=${RSDP_ALLOWED_ORIGINS}
      - RSDP_IMPORT_ALLOWED_IMAGE_HOSTS=${RSDP_IMPORT_ALLOWED_IMAGE_HOSTS:-}
    depends_on:
      - postgres
      - ollama
      - chromadb
      - redis
      - minio
    volumes:
      - server-data:/data

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: rsdp-web
    expose:
      - "80"
    depends_on:
      - server

  nginx:
    image: nginx:1.27-alpine
    container_name: rsdp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - web

volumes:
  postgres-data:
  ollama-models:
  chroma-data:
  redis-data:
  minio-data:
  server-data:
