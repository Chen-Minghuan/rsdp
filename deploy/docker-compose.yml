version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rsdp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rsdp
      POSTGRES_USER: rsdp
      POSTGRES_PASSWORD: rsdp
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/init_db_postgresql.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/seed_data_postgresql.sql:/docker-entrypoint-initdb.d/02-seed.sql

  ollama:
    image: ollama/ollama:latest
    container_name: rsdp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Windows 无 GPU 时删除 deploy.resources 部分

  chromadb:
    image: chromadb/chroma:latest
    container_name: rsdp-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  redis:
    image: redis:7-alpine
    container_name: rsdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: rsdp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: rsdp-server
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=rsdp
      - DB_USERNAME=rsdp
      - DB_PASSWORD=rsdp
      - OLLAMA_URL=http://ollama:11434
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - postgres
      - ollama
      - chromadb
      - redis
      - minio
    volumes:
      - server-data:/data

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: rsdp-web
    ports:
      - "80:80"
    depends_on:
      - server

  nginx:
    image: nginx:1.27-alpine
    container_name: rsdp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
      - web

volumes:
  postgres-data:
  ollama-models:
  chroma-data:
  redis-data:
  minio-data:
  server-data:
